# Conda environment for Agri-MBT multimodal experiments
name: agri-mbt
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch and CUDA
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8

  # Core scientific computing
  - numpy
  - scipy
  - pandas
  - scikit-learn

  # Computer vision (使用 conda-forge 的包，避免冲突)
  - opencv
  - pillow

  # Progress bars and utilities
  - tqdm
  - matplotlib
  - seaborn

  # Jupyter (optional)
  - jupyter
  - ipywidgets

  # Pip dependencies for deep learning
  - pip:
    - timm  # For ViT models
    - transformers
    - einops
    - openpyxl  # For Excel files
    - pytesseract
