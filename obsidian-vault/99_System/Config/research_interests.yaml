# evil-read-arxiv 配置文件
# 针对 Agri-MBT 项目的多模态研究兴趣配置

# Obsidian Vault 路径
vault_path: "/home/research/Agri-MBT/obsidian-vault"

# 研究领域和关键词
research_domains:
  "多模态融合":
    keywords:
      - "multimodal fusion"
      - "attention bottleneck"
      - "video trajectory fusion"
      - "cross-modal attention"
      - "multimodal transformer"
      - "vision-language"
    arxiv_categories:
      - "cs.CV"
      - "cs.MM"
      - "cs.LG"
    priority: 10

  "农业人工智能":
    keywords:
      - "agricultural activity recognition"
      - "smart farming"
      - "precision agriculture"
      - "agricultural automation"
      - "farming robotics"
    arxiv_categories:
      - "cs.CV"
      - "cs.RO"
      - "cs.AI"
    priority: 9

  "视觉 Transformer":
    keywords:
      - "Vision Transformer"
      - "ViT"
      - "video understanding"
      - "temporal modeling"
      - "video classification"
    arxiv_categories:
      - "cs.CV"
      - "cs.LG"
    priority: 8

  "轨迹分析":
    keywords:
      - "trajectory prediction"
      - "trajectory analysis"
      - "motion pattern"
      - "GPS trajectory"
      - "vehicle tracking"
    arxiv_categories:
      - "cs.CV"
      - "cs.RO"
      - "cs.LG"
    priority: 7

  "深度学习":
    keywords:
      - "deep learning"
      - "transfer learning"
      - "parameter-efficient"
      - "adapter"
      - "fine-tuning"
    arxiv_categories:
      - "cs.LG"
      - "cs.AI"
    priority: 6

# 排除的关键词
excluded_keywords:
  - "3D reconstruction"
  - "medical imaging"
  - "workshop"
  - "survey"
